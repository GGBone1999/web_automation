[pytest]
; 自动识别用例
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = cases

; 命令行参数 —— 让报告显示完整详情
addopts = 
    -v
    -s
    --tb=short
    --capture=no
    --html=report/report.html
    --self-contained-html
    --alluredir=report/allure-result
    --clean-alluredir
    --log-cli-level=INFO
    ; 注意：log-file 会被 conftest.py 动态覆盖，这里只做占位
    --log-file=reports/logs/test_run.log

; 编码
console_output_style = classic